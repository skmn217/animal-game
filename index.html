<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>どうぶつ えさあて！</title>

<style>
body{
text-align:center;
font-family:sans-serif;
background:#fef6e4;
overflow:hidden;
}

.screen{display:none;}
.show{display:block;}

h1{font-size:36px;}

.startBtn{
font-size:28px;
padding:20px 40px;
border:none;
border-radius:20px;
background:#ffb703;
}

/* 動物 */
.animal{
height:220px;
display:flex;
justify-content:center;
align-items:center;
}

.animal img{
max-height:200px;
object-fit:contain;
}

/* ボタン */
.container{
display:flex;
justify-content:center;
gap:20px;
}

.food{
font-size:50px;
padding:25px;
border-radius:30px;
border:none;
background:linear-gradient(145deg,#ffd166,#ffb703);
box-shadow:0 6px #cc8b00;
}

.food:active{
transform:translateY(4px);
box-shadow:0 2px #cc8b00;
}

.result{
font-size:26px;
margin:15px;
}

/* アニメ */
@keyframes jump{
50%{transform:scale(1.3);}
}
.jump{animation:jump .4s;}

@keyframes shake{
25%{transform:translateX(-10px);}
75%{transform:translateX(10px);}
}
.shake{animation:shake .4s;}

/* 星 */
.star{
position:absolute;
font-size:30px;
animation:fly 1s forwards;
}

@keyframes fly{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-120px);}
}

.combo{
font-size:28px;
color:#ff6600;
font-weight:bold;
}
</style>
</head>

<body>

<!-- タイトル -->
<div id="title" class="screen show">
<h1>🐾どうぶつ えさあて！</h1>
<p>ハイスコア：<span id="highScore">0</span></p>
<button class="startBtn" onclick="startGame()">▶ スタート</button>
</div>

<!-- ゲーム -->
<div id="game" class="screen">

<h1 id="levelText">レベル1</h1>

<div class="animal">
<img id="animalImg">
</div>

<div class="container">
<button class="food" onclick="check('bone')">🦴</button>
<button class="food" onclick="check('grass')">🌿</button>
<button class="food" onclick="check('fish')">🐟</button>
</div>

<div class="result" id="result"></div>
<div class="combo" id="combo"></div>

<div>スコア：<span id="score">0</span></div>

</div>

<!-- 終了 -->
<div id="finish" class="screen">
<h1>🎉おしまい！</h1>
<p>スコア：<span id="finalScore"></span></p>
<p>ハイスコア：<span id="finalHigh"></span></p>
<button class="startBtn" onclick="startGame()">もういちど</button>
</div>

<script>

/* 音 */
const seOK=new Audio("correct.mp3");
const seNG=new Audio("wrong.mp3");
const seStart=new Audio("start.mp3");
const bgm=new Audio("bgm.mp3");
bgm.loop=true;
bgm.volume=0.4;

/* 動物 */
const animals=[
{img:"dog.png",food:"bone"},
{img:"cow.png",food:"grass"},
{img:"cat.png",food:"fish"},
{img:"rabbit.png",food:"grass"}
];

let current;
let score=0;
let count=0;
let combo=0;
let level=1;

let highScore=localStorage.getItem("animalHighScore")||0;
document.getElementById("highScore").textContent=highScore;

/* 画面切替 */
function show(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

/* 開始 */
function startGame(){
score=0;
count=0;
combo=0;
level=1;

bgm.currentTime=0;
bgm.play();

seStart.play();

document.getElementById("score").textContent=0;
document.getElementById("combo").textContent="";
document.getElementById("levelText").textContent="レベル1";

show("game");
nextAnimal();
}

/* 次 */
function nextAnimal(){
current=animals[Math.floor(Math.random()*animals.length)];
document.getElementById("animalImg").src=current.img;
}

/* 星エフェクト */
function createStar(){
const star=document.createElement("div");
star.textContent="⭐";
star.className="star";
star.style.left=Math.random()*80+10+"%";
star.style.top="50%";
document.body.appendChild(star);

setTimeout(()=>star.remove(),1000);
}

/* 判定 */
function check(sel){

const img=document.getElementById("animalImg");
const result=document.getElementById("result");

if(sel===current.food){

seOK.currentTime=0;
seOK.play();

score++;
combo++;

result.textContent="もぐもぐ！😊";
img.classList.add("jump");

for(let i=0;i<3;i++) createStar();

}else{

seNG.currentTime=0;
seNG.play();

combo=0;
result.textContent="あれ？😢";
img.classList.add("shake");
}

document.getElementById("score").textContent=score;
document.getElementById("combo").textContent=
combo>=2 ? "🔥 "+combo+"コンボ！" : "";

count++;

/* レベルアップ */
if(count===5){
level=2;
document.getElementById("levelText").textContent="レベル2";
}
if(count===8){
level=3;
document.getElementById("levelText").textContent="レベル3";
}

setTimeout(()=>{
img.classList.remove("jump","shake");

if(count>=10){
finishGame();
}else{
nextAnimal();
}
},800);
}

/* 終了 */
function finishGame(){

bgm.pause();

if(score>highScore){
highScore=score;
localStorage.setItem("animalHighScore",highScore);
}

document.getElementById("finalScore").textContent=score;
document.getElementById("finalHigh").textContent=highScore;

show("finish");
}

</script>
</body>
</html>
