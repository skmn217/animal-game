<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クイズアプリ</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

.screen{
display:none;
}

.active{
display:block;
}

img{
width:250px;
height:250px;
object-fit:cover;
margin:10px;
}

button{
padding:12px 20px;
margin:8px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- ===== タイトル画面 ===== -->
<div id="title" class="screen active">
<h1>クイズアプリ</h1>
<button onclick="startQuiz()">スタート</button>
</div>

<!-- ===== クイズ画面 ===== -->
<div id="quiz" class="screen">
<h2 id="qNumber"></h2>
<p id="question"></p>

<button onclick="readQuestion()">🔊 よむ</button>

<div>
<button onclick="answer(0)">
<img id="img0"><br><span id="text0"></span>
</button>

<button onclick="answer(1)">
<img id="img1"><br><span id="text1"></span>
</button>
</div>
</div>

<!-- ===== 結果画面 ===== -->
<div id="result" class="screen">
<h2>けっか</h2>
<p id="score"></p>
<button onclick="goTitle()">タイトルへ戻る</button>
</div>

<script>

// =====================
// 問題データ
// =====================
const quiz = [
{
question:"これはどっち？",
choices:["ねこ","いぬ"],
images:["cat.jpg","dog.jpg"],
correct:0
},
{
question:"これはどっち？",
choices:["りんご","みかん"],
images:["apple.jpg","orange.jpg"],
correct:1
}
];

const MAX_QUESTIONS = 10;

let current = 0;
let score = 0;


// =====================
// 画面切替
// =====================
function showScreen(id){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}


// =====================
// スタート
// =====================
function startQuiz(){
current = 0;
score = 0;
showScreen("quiz");
showQuestion();
}


// =====================
// 問題表示
// =====================
function showQuestion(){

if(current >= MAX_QUESTIONS || current >= quiz.length){
showResult();
return;
}

const q = quiz[current];

document.getElementById("qNumber")
.textContent = `第${current+1}問`;

document.getElementById("question")
.textContent = q.question;

for(let i=0;i<2;i++){
document.getElementById("img"+i).src = q.images[i];
document.getElementById("text"+i).textContent = q.choices[i];
}
}


// =====================
// 回答
// =====================
function answer(i){
if(i === quiz[current].correct){
score++;
}

current++;
showQuestion();
}


// =====================
// 結果表示
// =====================
function showResult(){
showScreen("result");
document.getElementById("score")
.textContent = `${score} / ${Math.min(MAX_QUESTIONS, quiz.length)} 問せいかい！`;
}


// =====================
// タイトルへ戻る
// =====================
function goTitle(){
speechSynthesis.cancel();
showScreen("title");
}


// =====================
// 音声読み上げ
// =====================
function speak(text){
const uttr = new SpeechSynthesisUtterance(text);
uttr.lang="ja-JP";
uttr.rate=0.9;

speechSynthesis.cancel();
speechSynthesis.speak(uttr);
}

function readQuestion(){
const q = quiz[current];
speak(q.question);
}

</script>
</body>
</html>
